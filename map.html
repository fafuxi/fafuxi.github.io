<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>2024年各省GDP和智能公司数量</title>

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ height:100%; }

    /* 页眉 */
    .header{
      height:60px;
      background:#005f9e;
      color:white;
      display:flex;
      align-items:center;
      padding:0 20px;
      font-size:20px;
      font-weight:bold;
    }

    /* 主布局：地图 + 右侧信息面板 */
    .main-container{
      display: flex;
      height: calc(100vh - 60px);
    }

    /* 地图区域 */
    #viewDiv{
      flex: 1;
      position: relative;
    }

    /* 右侧信息面板（只展示，不切换底图） */
    .basemap-box{
      width: 260px;
      background:#f5f5f5;
      border-left:1px solid #ddd;
      padding:15px;
    }
    .basemap-box h3{
      color:#005f9e;
      margin-bottom:10px;
      border-bottom:2px solid #005f9e;
      padding-bottom:5px;
    }
    .basemap-item{
      padding:10px;
      background:white;
      margin:8px 0;
      border-radius:4px;
      border:1px solid #ccc;
    }

  </style>

  <!-- 兼容补丁 -->
  <script>
    if (!Array.prototype.findLast) {
      Array.prototype.findLast = function(fn){
        return this.slice().reverse().find(fn);
      };
    }
  </script>

  <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css">
  <script type="module" src="https://js.arcgis.com/5.0/"></script>

  <script type="module">
    const [
      MapView, WebMap, config,
      ScaleBar, Legend, Search, LayerList, LayerListViewModel
    ] = await $arcgis.import([
      "@arcgis/core/views/MapView",
      "@arcgis/core/WebMap",
      "@arcgis/core/config",
      "@arcgis/core/widgets/ScaleBar",
      "@arcgis/core/widgets/Legend",
      "@arcgis/core/widgets/Search",
      "@arcgis/core/widgets/LayerList",
      "@arcgis/core/widgets/LayerList/LayerListViewModel"
    ]);

    // 指向 GeoScene 中国
    config.portalUrl = "https://www.geosceneonline.cn/geoscene";

    // 你的原有地图（完全不变）
    const webmap = new WebMap({
      portalItem: { 
        id: "0b956aad18f949d6a32073cf3ec6f870" 
      }
    });

    const view = new MapView({
      container: "viewDiv",
      map: webmap
    });

    view.when(()=>{
      // 比例尺 - 左下角
      view.ui.add(new ScaleBar({ view, unit:"metric" }), "bottom-left");

      // 图例 - 右下角
      view.ui.add(new Legend({ view }), "bottom-right");

      // 搜索框
      view.ui.add(new Search({ view }), "top-left");

      // 图层控制
      const layerList = new LayerList({
        view: view,
        viewModel: new LayerListViewModel({
          view: view,
          showLegend: true,
          showOpacitySlider: true
        })
      });
      view.ui.add(layerList, "top-right");

    });
  </script>
</head>

<body>
  <!-- 页眉 -->
  <div class="header">2024年各省GDP和智能公司数量</div>

  <div class="main-container">
    <!-- 地图区域（原有底图完全不变） -->
    <div id="viewDiv"></div>

    <!-- 右侧信息面板（只展示文字） -->
    <div class="basemap-box">
      <h3>底图与图层信息</h3>
      <div class="basemap-item">底图：天地图-矢量（球面墨卡托投影）</div>
      <div class="basemap-item">已加载：2024年各省GDP数据</div>
      <div class="basemap-item">已加载：智能公司数量</div>
      <div class="basemap-item">控件：图例、比例尺、搜索</div>
    </div>
  </div>
</body>
</html>
